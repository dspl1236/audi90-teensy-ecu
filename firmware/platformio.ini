; =============================================================================
; platformio.ini — Audi90 Teensy ECU Interface
; Build with: pio run
; Upload with: pio run --target upload
; Monitor with: pio device monitor
; =============================================================================

[env:teensy41]
platform    = teensy
board       = teensy41
framework   = arduino

; Serial monitor baud rate
monitor_speed = 115200

; CPU speed — 600MHz is stock Teensy 4.1, can go to 816MHz (overclock)
board_build.f_cpu = 600000000L

; Optimise for speed — EPROM ISR timing is critical
build_flags =
    -O2
    -DEPROM_EMU_IMPL
    -DARDUINO_TEENSY41

; Libraries
lib_deps =
    ; FlexIO — built into Teensyduino, no extra install needed
    ; SD    — built into Teensyduino
    ; CAN   — FlexCAN_T4 from GitHub directly (PlatformIO registry version unreliable)
    https://github.com/tonton81/FlexCAN_T4.git

[env:teensy41_debug]
extends     = env:teensy41
build_flags =
    ${env:teensy41.build_flags}
    -DDEBUG_EPROM_READS    ; Print every EPROM read to serial (slow! bench only)
    -DDEBUG_SENSORS
    -DDEBUG_CORRECTIONS
