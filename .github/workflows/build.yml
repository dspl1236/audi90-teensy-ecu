name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Teensy Full firmware
        run: |
          pio run -e teensy41
          mkdir -p ${{ github.workspace }}/firmware_out
          find $HOME -name "firmware.hex" -path "*/teensy41/*" 2>/dev/null | head -1 | xargs -I{} cp {} ${{ github.workspace }}/firmware_out/teensy_full.hex || true
          find . -name "firmware.hex" -path "*/teensy41/*" 2>/dev/null | head -1 | xargs -I{} cp {} ${{ github.workspace }}/firmware_out/teensy_full.hex || true
          ls -la ${{ github.workspace }}/firmware_out/ 2>/dev/null || echo "firmware_out empty"
        working-directory: firmware

      - name: Build Teensy Lite firmware
        run: |
          pio run -c platformio_lite.ini -e teensy_lite
          find . -name "firmware.hex" -path "*/teensy_lite/*" 2>/dev/null | head -1 | xargs -I{} cp {} ${{ github.workspace }}/firmware_out/teensy_lite.hex || true
        working-directory: firmware

      - name: Collect hex files
        run: |
          echo "=== firmware_out contents ==="
          ls -lh firmware_out/ || echo "firmware_out missing"
          [ -f firmware_out/teensy_full.hex ] || (echo "ERROR: teensy_full.hex missing"; exit 1)
          [ -f firmware_out/teensy_lite.hex ] || (echo "ERROR: teensy_lite.hex missing"; exit 1)
          echo "Both hex files present"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hex
          path: firmware_out/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    needs: build-firmware
    outputs:
      exe_name: ${{ steps.ver.outputs.exe }}
      version:  ${{ steps.ver.outputs.num }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read app version
        id: ver
        shell: python
        run: |
          import re, os
          txt = open("tuner_app/version.py").read()
          v = re.search(r'APP_VERSION\s*=\s*"([^"]+)"', txt).group(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"num={v}\n")
              f.write(f"exe=Audi90Tuner-v{v}\n")

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyserial matplotlib pyinstaller

      - name: Download compiled firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-hex
          path: tuner_app/firmware/

      - name: Download teensy_loader_cli
        shell: cmd
        run: |
          mkdir tuner_app\tools 2>nul || exit 0
          curl.exe -L --retry 3 --retry-delay 5 -o tuner_app\tools\teensy_loader_cli.exe "https://github.com/PaulStoffregen/teensy_loader_cli/releases/download/v2.2/teensy_loader_cli.exe"
          if %ERRORLEVEL% neq 0 exit /b 1
          for %%A in (tuner_app\tools\teensy_loader_cli.exe) do echo Size: %%~zA bytes

      - name: Verify bundle contents
        run: |
          dir tuner_app\firmware\
          dir tuner_app\tools\

      - name: Build EXE with PyInstaller
        working-directory: tuner_app
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "${{ steps.ver.outputs.exe }}" `
            --add-data "ui;ui" `
            --add-data "serial_comm;serial_comm" `
            --add-data "firmware;firmware" `
            --add-data "tools;tools" `
            main.py

      - name: Verify EXE
        run: dir tuner_app\dist\

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audi90Tuner-Windows
          path: tuner_app/dist/${{ steps.ver.outputs.exe }}.exe
          retention-days: 90

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: Audi90Tuner-Windows
          path: dist/

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Audi90 Tuner v${{ needs.build-windows.outputs.version }} — Latest Build"
          body: |
            ## 7A 20v Tuner v${{ needs.build-windows.outputs.version }} — Auto-built from latest commit

            **Commit:** `${{ steps.sha.outputs.short }}` — ${{ github.event.head_commit.message }}

            ### Just download and run — no install needed
            Everything is bundled in the exe:
            - Teensy Full firmware (`teensy_full.hex`)
            - Teensy Lite firmware (`teensy_lite.hex`)
            - `teensy_loader_cli.exe` for one-click USB flashing

            ### Three modes — detected automatically on Teensy connect

            | Mode | Description | Tabs |
            |---|---|---|
            | **ROM Tool** | No Teensy required | ROM Tool, Console |
            | **Teensy Full** | Wideband AFR + live tuning | Live Gauges, Map Editor, ROM Manager, Hardware, Datalog, Console |
            | **Teensy Lite** | SD card map switcher | Map Switcher, ROM Tool, Console |

            ### First time with a new Teensy
            1. Run `${{ needs.build-windows.outputs.exe_name }}.exe`
            2. Connect Teensy 4.1 via USB
            3. Click **Connect** — app detects firmware status automatically
            4. If prompted, pick **Full** or **Lite** and click **Flash Now**
            5. Teensy reboots, tabs reconfigure automatically

            ### Teensy Lite wiring
            - Button: pin 2, active LOW (short press = next map, hold 3s = previous)
            - LED: pin 13 (onboard) — blinks = active map number
            - SD: built-in Teensy 4.1 slot — name files `map1.bin` … `map8.bin`

            ---
            *1990 Audi 90 2.6L Stroker — Teensy 4.1 ECU interface*
          files: dist/${{ needs.build-windows.outputs.exe_name }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
